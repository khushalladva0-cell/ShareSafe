
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify Password - ShareSafe</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0A192F;
color:white;
min-height:100vh;
}

.navbar{
background:#112240;
padding:20px;
text-align:center;
}

.logo{
font-size:35px;
font-weight:bold;
color:#64FFDA;
}

.container{
display:flex;
justify-content:center;
align-items:center;
height:80vh;
padding:20px;
}

.verify-card{
background:#112240;
width:100%;
max-width:600px;
padding:35px;
border-radius:15px;
}

.verify-card h1{
text-align:center;
margin-bottom:25px;
}

.file-info{
background:#0A192F;
padding:15px;
border-radius:10px;
margin-bottom:20px;
color:#CCD6F6;
}

label{
display:block;
margin-bottom:10px;
}

input{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#0A192F;
color:white;
margin-bottom:20px;
}

.btn{
width:100%;
padding:15px;
background:#64FFDA;
color:#0A192F;
font-weight:bold;
border:none;
border-radius:10px;
cursor:pointer;
}

.btn:hover{
opacity:.9;
}

.home-btn{
display:block;
text-align:center;
margin-top:20px;
color:#64FFDA;
text-decoration:none;
}

</style>
</head>

<body>

<header class="navbar">
<div class="logo">ShareSafe</div>
</header>

<div class="container">

<div class="verify-card">

<h1>Verify Password</h1>

<div class="file-info">
File Name: {{ file_name }}
</div>
<form action="/check-password" method="POST">

<input
type="hidden"
name="token"
value="{{ token }}"
>

<label>Enter Password</label>

<input
type="password"
name="password"
placeholder="Enter file password"
required>

<button type="submit" class="btn">
Access File
</button>

</form>

<a href="home" class="home-btn">
← Back Home
</a>

</div>

</div>

</body>
</html>
