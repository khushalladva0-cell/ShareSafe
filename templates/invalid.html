<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invalid Password - ShareSafe</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0A192F;
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.error-card{
background:#112240;
width:90%;
max-width:500px;
padding:40px;
border-radius:15px;
text-align:center;
}

.error-icon{
font-size:70px;
margin-bottom:20px;
}

h1{
margin-bottom:15px;
}

p{
color:#CCD6F6;
margin-bottom:30px;
}

.btn{
display:block;
width:100%;
padding:15px;
margin-top:15px;
text-decoration:none;
font-weight:bold;
border-radius:10px;
}

.try-btn{
background:#64FFDA;
color:#0A192F;
}

.home-btn{
background:#0A192F;
color:white;
border:1px solid #64FFDA;
}

</style>
</head>
<body>

<div class="error-card">

<div class="error-icon">❌</div>

<h1>Invalid Password</h1>

<p>
The password you entered is incorrect.
Please try again.
</p>

<a href="verify" class="btn try-btn">
Try Again
</a>

<a href="home" class="btn home-btn">
Back Home
</a>

</div>

</body>
</html>
