
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link Expired - ShareSafe</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0A192F;
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.expired-card{
background:#112240;
width:100%;
max-width:550px;
padding:40px;
border-radius:15px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,0.3);
}

.icon{
font-size:70px;
margin-bottom:20px;
}

h1{
margin-bottom:15px;
color:#ff6b6b;
}

.message{
color:#CCD6F6;
line-height:1.8;
margin-bottom:30px;
}

.btn{
display:block;
width:100%;
padding:15px;
text-decoration:none;
font-weight:bold;
border-radius:10px;
margin-top:15px;
}

.home-btn{
background:#64FFDA;
color:#0A192F;
}

.receive-btn{
background:#0A192F;
color:white;
border:1px solid #64FFDA;
}

</style>
</head>

<body>

<div class="expired-card">

<div class="icon">
⏰
</div>

<h1>Link Expired</h1>

<p class="message">
This link has expired and the file is no longer available for download.
Please contact the sender and request a new secure link.
</p>

<a href="home" class="btn home-btn">
Back Home
</a>

<a href="receive" class="btn receive-btn">
Receive Another File
</a>

</div>

</body>
</html>
