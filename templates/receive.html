
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receive File - ShareSafe</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0A192F;
color:white;
min-height:100vh;
}

.navbar{
background:#112240;
padding:20px;
text-align:center;
}

.logo{
font-size:35px;
font-weight:bold;
color:#64FFDA;
}

.container{
display:flex;
justify-content:center;
align-items:center;
height:80vh;
padding:20px;
}

.receive-card{
background:#112240;
width:100%;
max-width:600px;
padding:35px;
border-radius:15px;
}

.receive-card h1{
text-align:center;
margin-bottom:25px;
}

label{
display:block;
margin-bottom:10px;
}

input{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#0A192F;
color:white;
margin-bottom:20px;
}

.btn{
width:100%;
padding:15px;
background:#64FFDA;
color:#0A192F;
font-weight:bold;
border:none;
border-radius:10px;
cursor:pointer;
}

.btn:hover{
opacity:.9;
}

.home-btn{
display:block;
text-align:center;
margin-top:20px;
color:#64FFDA;
text-decoration:none;
}

</style>
</head>

<body>

<header class="navbar">
<div class="logo">ShareSafe</div>
</header>

<div class="container">

<div class="receive-card">

<h1>Receive File</h1>

<form action="/open-link" method="GET">

<label>Paste ShareSafe Link</label>

<input
type="text"
name="share_link"
placeholder="Paste secure link here..."
required>

<button type="submit" class="btn">
Continue
</button>

</form>


<a href="home" class="home-btn">
← Back Home
</a>

</div>

</div>

</body>
</html>
