
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Share File - ShareSafe</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0A192F;
color:white;
min-height:100vh;
}

.navbar{
background:#112240;
padding:18px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:30px;
font-weight:bold;
color:#64FFDA;
}

.nav-menu a{
color:white;
text-decoration:none;
margin-left:20px;
}

.container{
display:flex;
justify-content:center;
align-items:center;
padding:60px 20px;
}

.share-card{
background:#112240;
width:100%;
max-width:600px;
padding:35px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
}

.share-card h1{
text-align:center;
margin-bottom:30px;
}

.form-group{
margin-bottom:20px;
}

label{
display:block;
margin-bottom:8px;
}

input[type=file]{
width:100%;
padding:12px;
background:#0A192F;
border:1px solid #64FFDA;
border-radius:10px;
color:white;
}

select{
width:100%;
padding:12px;
background:#0A192F;
border:1px solid #64FFDA;
border-radius:10px;
color:white;
}

.btn{
display:block;
width:100%;
padding:15px;
background:#64FFDA;
color:#0A192F;
font-weight:bold;
border-radius:10px;
font-size:16px;
text-decoration:none;
text-align:center;
cursor:pointer;
}

.btn:hover{
opacity:0.9;
}

.info-box{
margin-top:25px;
padding:15px;
background:#0A192F;
border-radius:10px;
color:#CCD6F6;
}

</style>
</head>

<body>

<header class="navbar">

<div class="logo">
ShareSafe
</div>

<div class="nav-menu">
<a href="home">Home</a>
<a href="share">Share File</a>
<a href="receive">Receive File</a>
<a href="myfiles">My Files</a>
</div>

</header>

<div class="container">

<div class="share-card">

<h1>Share File</h1>

<form action="/upload" method="POST" enctype="multipart/form-data">

    <div class="form-group">
        <label>Select File</label>
        <input type="file" name="file" required>
    </div>

    <div class="form-group">
        <label>Expiry Time</label>

        <select name="expiry" required>
            <option value="">Select Expiry Time</option>
            <option value="1">1 Hour</option>
            <option value="24">24 Hours</option>
            <option value="168">7 Days</option>
        </select>
    </div>

    <button type="submit" class="btn">
        Generate Secure Link
    </button>

</form>

<div class="info-box">

Password will be generated automatically.

A secure download link will be created after upload.

</div>

</div>

</div>

</a>
</body>
</html>
